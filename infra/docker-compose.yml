# Phase 0 infra: data services only.
# Observability stack (Prometheus/Grafana/Loki/Alertmanager) lands in Phase 7.

name: jobradar

services:
  postgres:
    image: postgres:16-alpine
    container_name: jobradar-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: jobradar
      POSTGRES_PASSWORD: jobradar
      POSTGRES_DB: jobradar
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobradar -d jobradar"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: jobradar-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: jobradar-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: jobradar
      RABBITMQ_DEFAULT_PASS: jobradar
    ports:
      - "5672:5672"      # AMQP
      - "15672:15672"    # Management UI -> http://localhost:15672 (jobradar/jobradar)
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  mongo:
    image: mongo:7
    container_name: jobradar-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: jobradar
      MONGO_INITDB_ROOT_PASSWORD: jobradar
      MONGO_INITDB_DATABASE: jobradar
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  mongo_data:
